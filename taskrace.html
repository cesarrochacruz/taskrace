<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskRace</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26; --border:#2a2a40;
  --accent:#7c6af7; --accent2:#f7c86a; --text:#e8e8f0; --text2:#8888aa;
  --dev:#7c6af7; --qa:#f76a9a; --danger:#f76a6a; --radius:12px; --lane-h:90px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.app{position:relative;z-index:1}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--border);background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.logo{font-size:22px;font-weight:800;letter-spacing:-.5px}
.logo span{color:var(--accent)}.logo em{color:var(--accent2);font-style:normal}
nav{display:flex;gap:4px}
nav button{background:none;border:1px solid transparent;color:var(--text2);padding:8px 18px;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;transition:all .2s}
nav button:hover{color:var(--text);background:var(--surface2)}
nav button.active{color:var(--accent);border-color:var(--accent);background:rgba(124,106,247,.1)}

/* VIEWS */
.view{display:none;padding:32px}.view.active{display:block}
#view-race{padding:0}
.section-title{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.section-sub{color:var(--text2);font-size:14px;margin-bottom:28px;font-family:'DM Mono',monospace}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .2s,transform .2s;position:relative}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card-avatar{width:52px;height:52px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;margin-bottom:12px}
.card-avatar img{width:100%;height:100%;object-fit:cover}
.card-name{font-size:17px;font-weight:700;margin-bottom:4px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.badge-dev{background:rgba(124,106,247,.15);color:var(--dev)}.badge-qa{background:rgba(247,106,154,.15);color:var(--qa)}
.card-tasks{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
.task-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:11px;display:flex;align-items:center;gap:4px}
.card-actions{display:flex;gap:8px;margin-top:14px}
.btn-sm{flex:1;padding:7px 0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);font-family:'Syne',sans-serif;background:var(--surface2);color:var(--text2);transition:all .2s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}.btn-sm.danger:hover{border-color:var(--danger);color:var(--danger)}
.btn-add{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;padding:11px 22px;border-radius:var(--radius);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:24px}
.btn-add:hover{background:#6a59e0;transform:translateY(-1px)}

/* MODAL */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:20px;font-weight:800;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;transition:border-color .2s;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-primary{flex:1;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:#6a59e0}
.btn-cancel{flex:1;background:none;border:1px solid var(--border);color:var(--text2);padding:12px;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-cancel:hover{border-color:var(--text2);color:var(--text)}

/* CHECKLIST (task assignment in user modal) */
.check-list{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto}
.task-check-group{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.task-check-header{display:flex;align-items:center;gap:10px;background:var(--surface2);padding:10px 14px;cursor:pointer;transition:background .2s;user-select:none}
.task-check-header:hover{background:#22223a}
.task-check-header input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px;flex-shrink:0}
.task-check-header-label{flex:1;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.task-check-toggle{font-size:10px;color:var(--text2);transition:transform .2s}
.task-check-toggle.open{transform:rotate(180deg)}
.subtask-check-list{display:none;flex-direction:column;border-top:1px solid var(--border);background:var(--bg)}
.subtask-check-list.open{display:flex}
.subtask-check-item{display:flex;align-items:center;gap:10px;padding:8px 14px 8px 36px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.subtask-check-item:last-child{border-bottom:none}
.subtask-check-item:hover{background:var(--surface2)}
.subtask-check-item input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;flex-shrink:0}
.subtask-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.subtask-check-name{font-size:12px;flex:1}
.subtask-check-date{font-size:10px;font-family:'DM Mono',monospace;color:var(--text2)}

/* COLOR PICKER */
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .2s}
.color-dot:hover,.color-dot.selected{border-color:#fff;transform:scale(1.15)}

/* TASKS VIEW */
.task-card-icon{font-size:28px;margin-bottom:10px}
.subtask-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.subtask-item{background:var(--surface2);border:1px solid var(--border);padding:7px 12px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.subtask-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.drop-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(247,200,106,.12);border:1px solid rgba(247,200,106,.3);border-radius:20px;padding:2px 8px;font-size:10px;font-family:'DM Mono',monospace;color:var(--accent2)}

/* DROPS VIEW */
.drop-card-active{border-color:rgba(247,200,106,.4)!important}
.drop-status{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.drop-status-on{background:rgba(106,247,200,.15);color:#6af7c8}
.drop-status-off{background:rgba(136,136,170,.1);color:var(--text2)}

/* RACE HEADER */
.race-header{padding:24px 32px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.race-date{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent2);background:rgba(247,200,106,.1);border:1px solid rgba(247,200,106,.3);padding:6px 14px;border-radius:20px}

/* RACE TRACK */
.race-track-container{padding:28px 32px;overflow-x:auto}
.race-track{position:relative;min-width:860px}

/* DROP RULER */
.drop-ruler-row{display:flex;align-items:flex-end;margin-bottom:4px}
.drop-ruler-spacer{width:154px;flex-shrink:0}
.drop-ruler-lane{flex:1;position:relative;height:48px}
.drop-ruler-line{position:absolute;left:0;right:0;bottom:0;height:1px;border-bottom:1px dashed rgba(247,200,106,.25)}
.drop-pin{position:absolute;bottom:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:1px;cursor:default;z-index:5}
.drop-pin-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--accent2);white-space:nowrap;background:rgba(10,10,15,.9);padding:1px 5px;border-radius:4px;border:1px solid rgba(247,200,106,.3);opacity:0;transition:opacity .15s;pointer-events:none;margin-bottom:1px}
.drop-pin:hover .drop-pin-label{opacity:1}
.drop-pin-flag{font-size:20px;line-height:1;filter:drop-shadow(0 0 5px rgba(247,200,106,.9));transition:transform .15s}
.drop-pin:hover .drop-pin-flag{transform:scale(1.2)}
.drop-pin-stem{width:1px;height:8px;background:rgba(247,200,106,.45)}

/* RACE ROW */
.race-row{display:flex;align-items:center;margin-bottom:16px}
.race-user-label{width:154px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding-right:14px}
.race-user-avatar{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden;flex-shrink:0}
.race-user-avatar img{width:100%;height:100%;object-fit:cover}
.race-user-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.race-user-role{font-size:10px;font-family:'DM Mono',monospace}

/* LANE */
.race-lane{flex:1;height:var(--lane-h);position:relative;display:flex;align-items:center}
.lane-line{position:absolute;left:0;right:0;height:3px;top:50%;transform:translateY(-50%);background:var(--border);border-radius:2px}
.lane-line-fill{position:absolute;left:0;height:3px;top:50%;transform:translateY(-50%);border-radius:2px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.lane-start-flag{position:absolute;left:-4px;top:50%;transform:translateY(-50%);z-index:3;font-size:22px;line-height:1;filter:drop-shadow(0 0 5px rgba(255,255,255,.3))}
.lane-end-flag{position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:24px;z-index:3}

/* SUBTASK MARKERS on lane */
.lane-sub-marker{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%);z-index:20;border:2px solid #000;box-shadow:0 1px 3px rgba(0,0,0,.5)}
.avatar-overlay{position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:15}
.avatar-overlay-dot{position:absolute;width:12px;height:12px;border-radius:50%;border:2px solid #fff;transform:translate(-50%,-50%);cursor:default;pointer-events:all;transition:transform .15s;box-shadow:0 1px 4px rgba(0,0,0,.6)}
.avatar-overlay-dot:hover{transform:translate(-50%,-50%) scale(1.5);z-index:20}


/* RUNNER */
.lane-runner{position:absolute;top:50%;transform:translate(-50%,-50%);z-index:10;transition:left 1s cubic-bezier(.4,0,.2,1)}
.runner-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
.runner-avatar{width:42px;height:42px;border-radius:50%;background:var(--surface2);border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.runner-avatar img{width:100%;height:100%;object-fit:cover}

/* DOTS above runner */
.runner-dots{display:flex;gap:5px;align-items:flex-end;position:absolute;bottom:100%;margin-bottom:5px;left:50%;transform:translateX(-50%);white-space:nowrap}
.runner-task-group{display:flex;align-items:center;gap:2px;background:rgba(0,0,0,.5);border-radius:20px;padding:2px 5px 2px 3px;border:1px solid rgba(255,255,255,.08)}
.runner-task-icon{font-size:14px;line-height:1;flex-shrink:0;margin-right:1px;position:relative;cursor:default}
.runner-task-icon.has-tooltip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--accent);color:var(--text);font-size:10px;font-family:'Syne',sans-serif;white-space:nowrap;padding:3px 8px;border-radius:6px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:50}
.runner-task-icon.has-tooltip:hover::after{opacity:1}
.runner-dot{width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,.25);flex-shrink:0}
.runner-dot.done{filter:none}.runner-dot.pending{filter:brightness(.35)}

/* LEGEND */
.race-legend{padding:16px 32px;border-top:1px solid var(--border);display:flex;gap:20px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.legend-dot{width:12px;height:12px;border-radius:50%}

/* CLASSIFICATION */
.race-classification{border-top:1px solid var(--border);padding:28px 32px 36px}
.class-title{font-size:18px;font-weight:800;letter-spacing:-.5px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.class-table{display:flex;flex-direction:column;gap:10px}
.class-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;transition:border-color .2s}
.class-row:hover{border-color:var(--accent)}
.class-rank{font-size:20px;font-weight:800;font-family:'DM Mono',monospace;width:28px;text-align:center;flex-shrink:0}
.class-user-avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
.class-user-avatar img{width:100%;height:100%;object-fit:cover}
.class-user-info{min-width:110px}
.class-user-name{font-size:15px;font-weight:700;margin-bottom:3px}
.class-user-role{font-size:11px;font-family:'DM Mono',monospace}
.class-tasks{display:flex;flex-wrap:wrap;gap:8px;flex:1}
.class-task-group{display:flex;align-items:flex-start;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:6px 10px}
.class-task-icon{font-size:20px;flex-shrink:0}
.class-task-body{display:flex;flex-direction:column;gap:4px}
.class-task-name{font-size:11px;font-weight:700;color:var(--text2)}
.class-sub-entry{display:flex;align-items:center;gap:5px}
.class-sub-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);flex-shrink:0}
.class-sub-dot.done{filter:none}.class-sub-dot.pending{filter:brightness(.35)}
.class-sub-info{display:flex;flex-direction:column;gap:1px}
.class-sub-name{font-size:10px;font-weight:600;color:var(--text);line-height:1.2}
.class-sub-date{font-size:9px;font-family:'DM Mono',monospace;color:var(--text2)}
.class-progress-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:70px}
.class-progress-pct{font-size:20px;font-weight:800;font-family:'DM Mono',monospace}
.class-progress-bar-bg{width:70px;height:5px;background:var(--border);border-radius:3px}
.class-progress-bar{height:5px;border-radius:3px;transition:width 1s ease}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state .ei{font-size:48px;margin-bottom:16px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s ease;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.img-preview{width:60px;height:60px;border-radius:50%;object-fit:cover;margin-top:8px;border:2px solid var(--border);display:none}
select option{background:var(--surface);color:var(--text)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:700px){header{padding:14px 16px;flex-wrap:wrap;gap:10px}.view{padding:16px}.race-track-container{padding:16px}.race-user-label{width:110px}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Task<span>Race</span><em>.</em></div>
    <nav>
      <button class="active" onclick="switchView('race')">🏁 Carrera</button>
      <button onclick="switchView('users')">👤 Usuarios</button>
      <button onclick="switchView('tasks')">📋 Tareas</button>
      <button onclick="switchView('drops')">💧 Drops</button>
    </nav>
  </header>

  <!-- RACE VIEW -->
  <div id="view-race" class="view active">
    <div class="race-header">
      <div>
        <div class="section-title">Carrera de Tareas</div>
        <div style="color:var(--text2);font-size:13px;font-family:'DM Mono',monospace">Progreso en tiempo real</div>
      </div>
      <div class="race-date" id="race-date"></div>
    </div>
    <div class="race-track-container">
      <div class="race-track" id="race-track"></div>
    </div>
    <div class="race-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Subtarea completada</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>Pendiente</div>
      <div class="legend-item"><span>🏳️</span>Inicio (Drop más antiguo)</div>
      <div class="legend-item"><span>🏁</span>Drop activo</div>
    </div>
    <div class="race-classification" id="race-classification"></div>
  </div>

  <!-- USERS VIEW -->
  <div id="view-users" class="view">
    <div class="section-title">Usuarios</div>
    <div class="section-sub">// gestión de participantes</div>
    <button class="btn-add" onclick="openModal('user')">+ Nuevo Usuario</button>
    <div class="cards-grid" id="users-grid"></div>
  </div>

  <!-- TASKS VIEW -->
  <div id="view-tasks" class="view">
    <div class="section-title">Tareas</div>
    <div class="section-sub">// tareas y sub-tareas</div>
    <button class="btn-add" onclick="openModal('task')">+ Nueva Tarea</button>
    <div class="cards-grid" id="tasks-grid"></div>
  </div>

  <!-- DROPS VIEW -->
  <div id="view-drops" class="view">
    <div class="section-title">Drops</div>
    <div class="section-sub">// hitos de entrega — solo los activos se muestran en carrera</div>
    <button class="btn-add" onclick="openModal('drop')">+ Nuevo Drop</button>
    <div class="cards-grid" id="drops-grid"></div>
  </div>
</div>

<!-- MODAL USER -->
<div class="modal-backdrop" id="modal-user">
  <div class="modal">
    <h3 id="modal-user-title">Nuevo Usuario</h3>
    <div class="form-group"><label>Nombre</label><input type="text" id="user-name" placeholder="Ej: María García"></div>
    <div class="form-group">
      <label>Imagen (URL o archivo)</label>
      <input type="text" id="user-img-url" placeholder="https://..." oninput="previewImg()">
      <input type="file" id="user-img-file" accept="image/*" style="margin-top:6px" onchange="previewImgFile()">
      <img id="img-preview" class="img-preview">
    </div>
    <div class="form-group"><label>Área de trabajo</label>
      <select id="user-role">
        <option value="dev">🧑‍💻 Desarrollador</option>
        <option value="qa">🔍 QA</option>
      </select>
    </div>
    <div class="form-group"><label>Asignar Tareas</label><div class="check-list" id="task-checklist"></div></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('user')">Cancelar</button>
      <button class="btn-primary" onclick="saveUser()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL TASK -->
<div class="modal-backdrop" id="modal-task">
  <div class="modal">
    <h3 id="modal-task-title">Nueva Tarea</h3>
    <div class="form-group"><label>Nombre</label><input type="text" id="task-name" placeholder="Ej: Desarrollo de API"></div>
    <div class="form-group"><label>Ícono (emoji)</label><input type="text" id="task-icon" placeholder="🚀" maxlength="4"></div>
    <div class="form-group"><label>Estado</label>
      <select id="task-active">
        <option value="true">✅ Activo — visible en carrera</option>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// SUPABASE CONFIG
// ============================================================
const SUPA_URL = 'https://hccylntvfeloodbnigsq.supabase.co';
const SUPA_KEY = 'sb_publishable_Q4LlI6AN0ptTsf74IAGVmA_LHwOaRFG';
const H = {
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function sbGet(table) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?select=*&order=created_at.asc`, {headers:H});
  if (!r.ok) { console.error('GET', table, await r.text()); return []; }
  return r.json();
}
async function sbInsert(table, row) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {method:'POST', headers:H, body:JSON.stringify(row)});
  if (!r.ok) { console.error('INSERT', table, await r.text()); return null; }
  const d = await r.json(); return Array.isArray(d) ? d[0] : d;
}
async function sbUpdate(table, id, row) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {method:'PATCH', headers:H, body:JSON.stringify(row)});
  if (!r.ok) { console.error('UPDATE', table, await r.text()); return null; }
  const d = await r.json(); return Array.isArray(d) ? d[0] : d;
}
async function sbDelete(table, id) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {method:'DELETE', headers:H});
  if (!r.ok) console.error('DELETE', table, await r.text());
}

// DB row → app object
function normUser(r) {
  return {id:r.id, name:r.name, img:r.img, imgData:r.img_data, role:r.role,
          taskIds:r.task_ids||[], subtaskIds:r.subtask_ids||[]};
}
function normTask(r) {
  return {id:r.id, name:r.name, icon:r.icon, active:r.active!==false, subtasks:r.subtasks||[]};
}
function normDrop(r) {
  return {id:r.id, name:r.name, date:r.date, active:r.active!==false};
}

// ============================================================
// STATE
// ============================================================
let users=[], tasks=[], drops=[];
let editingUserId=null, editingTaskId=null, editingDropId=null;
const COLORS=['#7c6af7','#f76a9a','#6af7c8','#f7c86a','#f76a6a','#6ac5f7','#c86af7','#f7a06a','#a0f76a','#6a9af7'];

// ============================================================
// INIT
// ============================================================
function showLoader(on) {
  let el = document.getElementById('app-loader');
  if (!el) {
    el = document.createElement('div');
    el.id = 'app-loader';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(10,10,15,.92);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:14px';
    el.innerHTML = '<div style="font-size:40px;animation:spin 1s linear infinite">⚙️</div><div style="font-family:Syne,sans-serif;font-size:16px;color:#e8e8f0">Conectando con Supabase...</div>';
    const s = document.createElement('style');
    s.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
    document.body.appendChild(el);
  }
  el.style.display = on ? 'flex' : 'none';
}

async function init() {
  showLoader(true);
  try {
    const [ru, rt, rd] = await Promise.all([sbGet('users'), sbGet('tasks'), sbGet('drops')]);
    users = ru.map(normUser);
    tasks = rt.map(normTask);
    drops = rd.map(normDrop);
  } catch(e) {
    console.error(e);
    toast('❌ Error conectando a Supabase');
  }
  showLoader(false);
  renderAll();
  setInterval(()=>document.getElementById('race-date').textContent=
    new Date().toLocaleDateString('es',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),1000);
  document.getElementById('race-date').textContent=
    new Date().toLocaleDateString('es',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

function uid(){ return (crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2,18)); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }

// ============================================================
// VIEWS
// ============================================================
function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  const idx=['race','users','tasks','drops'].indexOf(name);
  document.querySelectorAll('nav button')[idx].classList.add('active');
  if(name==='race') renderRace();
}
function renderAll(){ renderUsers(); renderTasks(); renderDrops(); renderRace(); }

// ============================================================
// MODALS
// ============================================================
function openModal(type){
  if(type==='user'){
    editingUserId=null;
    document.getElementById('modal-user-title').textContent='Nuevo Usuario';
    document.getElementById('user-name').value='';
    document.getElementById('user-img-url').value='';
    document.getElementById('user-img-file').value='';
    document.getElementById('img-preview').style.display='none';
    document.getElementById('user-role').value='dev';
    renderTaskChecklist([],[]);
    document.getElementById('modal-user').classList.add('open');
  } else if(type==='task'){
    editingTaskId=null;
    document.getElementById('modal-task-title').textContent='Nueva Tarea';
    document.getElementById('task-name').value='';
    document.getElementById('task-icon').value='';
    document.getElementById('task-active').value='true';
    document.getElementById('subtask-fields').innerHTML='';
    subtaskCount=0;
    document.getElementById('modal-task').classList.add('open');
  } else if(type==='drop'){
    editingDropId=null;
    document.getElementById('modal-drop-title').textContent='Nuevo Drop';
    document.getElementById('drop-name').value='';
    document.getElementById('drop-date').value='';
    document.getElementById('drop-active').value='true';
    document.getElementById('modal-drop').classList.add('open');
  }
}
function closeModal(type){ document.getElementById('modal-'+type).classList.remove('open'); }
document.querySelectorAll('.modal-backdrop').forEach(b=>b.addEventListener('click',e=>{ if(e.target===b) b.classList.remove('open'); }));

// ============================================================
// USERS
// ============================================================
function renderUsers(){
  const g=document.getElementById('users-grid');
  if(!users.length){ g.innerHTML='<div class="empty-state"><div class="ei">👤</div><p>No hay usuarios aún.</p></div>'; return; }
  g.innerHTML=users.map(u=>{
    const ut=tasks.filter(t=>(u.taskIds||[]).includes(t.id));
    const av=u.imgData?`<img src="${u.imgData}">`:`<span>${u.img||'🧑'}</span>`;
    return `<div class="card">
      <div class="card-avatar">${av}</div>
      <div class="card-name">${esc(u.name)}</div>
      <div style="margin-top:5px"><span class="badge badge-${u.role}">${u.role==='dev'?'🧑‍💻 Dev':'🔍 QA'}</span></div>
      <div class="card-tasks">${ut.map(t=>`<span class="task-chip">${t.icon||'📋'} ${esc(t.name)}</span>`).join('')||'<span style="font-size:11px;color:var(--text2)">Sin tareas</span>'}</div>
      <div class="card-actions">
        <button class="btn-sm" onclick="editUser('${u.id}')">✏️ Editar</button>
        <button class="btn-sm danger" onclick="deleteUser('${u.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function editUser(id){
  const u=users.find(x=>x.id===id); if(!u) return;
  editingUserId=id;
  document.getElementById('modal-user-title').textContent='Editar Usuario';
  document.getElementById('user-name').value=u.name;
  document.getElementById('user-img-url').value=(u.img&&u.img.startsWith('http'))?u.img:'';
  document.getElementById('user-role').value=u.role;
  const pr=document.getElementById('img-preview');
  if(u.imgData){pr.src=u.imgData;pr.style.display='block';}else pr.style.display='none';
  renderTaskChecklist(u.taskIds||[],u.subtaskIds||[]);
  document.getElementById('modal-user').classList.add('open');
}

function renderTaskChecklist(selT,selS){
  const el=document.getElementById('task-checklist');
  if(!tasks.length){el.innerHTML='<p style="font-size:12px;color:var(--text2)">No hay tareas creadas aún.</p>';return;}
  el.innerHTML=tasks.map(t=>{
    const subs=[...(t.subtasks||[])].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const tc=selT.includes(t.id);
    const subsHtml=subs.length?`<div class="subtask-check-list ${tc?'open':''}" id="stlist-${t.id}">
      ${subs.map(s=>`<label class="subtask-check-item">
        <input type="checkbox" class="sub-check" data-task="${t.id}" value="${s.id}" ${selS.includes(s.id)?'checked':''}>
        <div class="subtask-dot" style="background:${s.color}"></div>
        <span class="subtask-check-name">${esc(s.name)}</span>
        <span class="subtask-check-date">${s.date}</span>
      </label>`).join('')}
    </div>`:'';
    return `<div class="task-check-group">
      <div class="task-check-header" onclick="toggleTaskGroup('${t.id}')">
        <input type="checkbox" class="task-main-check" value="${t.id}" ${tc?'checked':''}
          onclick="event.stopPropagation();handleTaskCheck(this,'${t.id}')">
        <span class="task-check-header-label">${t.icon||'📋'} ${esc(t.name)}</span>
        ${subs.length?`<span class="task-check-toggle ${tc?'open':''}" id="toggle-${t.id}">▼</span>`:''}
      </div>${subsHtml}
    </div>`;
  }).join('');
}

function toggleTaskGroup(id){
  document.getElementById('stlist-'+id)?.classList.toggle('open');
  document.getElementById('toggle-'+id)?.classList.toggle('open');
}
function handleTaskCheck(cb,id){
  if(cb.checked){document.getElementById('stlist-'+id)?.classList.add('open');document.getElementById('toggle-'+id)?.classList.add('open');}
  else document.querySelectorAll(`.sub-check[data-task="${id}"]`).forEach(s=>s.checked=false);
}

let pendingImgData=null;
function previewImg(){ const u=document.getElementById('user-img-url').value.trim(),p=document.getElementById('img-preview'); if(u){p.src=u;p.style.display='block';pendingImgData=null;}else p.style.display='none'; }
function previewImgFile(){ const f=document.getElementById('user-img-file').files[0]; if(!f)return; const r=new FileReader(); r.onload=e=>{pendingImgData=e.target.result;const p=document.getElementById('img-preview');p.src=pendingImgData;p.style.display='block';}; r.readAsDataURL(f); }

async function saveUser(){
  const name=document.getElementById('user-name').value.trim();
  if(!name){toast('⚠️ Ingresa un nombre');return;}
  const role=document.getElementById('user-role').value;
  const imgUrl=document.getElementById('user-img-url').value.trim();
  const taskIds=[...document.querySelectorAll('.task-main-check:checked')].map(x=>x.value);
  const subtaskIds=[...document.querySelectorAll('.sub-check:checked')].map(x=>x.value);
  const img=imgUrl||(role==='dev'?'🧑‍💻':'🔍');
  const imgData=pendingImgData||null;
  const row={name, img, img_data:imgData, role, task_ids:taskIds, subtask_ids:subtaskIds};
  if(editingUserId){
    const saved=await sbUpdate('users', editingUserId, row);
    if(saved){ const u=users.find(x=>x.id===editingUserId); Object.assign(u, normUser({...row, id:editingUserId})); }
  } else {
    const saved=await sbInsert('users', row);
    if(saved) users.push(normUser(saved));
  }
  pendingImgData=null; renderAll(); closeModal('user'); toast('✅ Usuario guardado');
}
async function deleteUser(id){
  await sbDelete('users', id);
  users=users.filter(u=>u.id!==id); renderAll(); toast('🗑 Usuario eliminado');
}

// ============================================================
// TASKS
// ============================================================
function renderTasks(){
  const g=document.getElementById('tasks-grid');
  if(!tasks.length){g.innerHTML='<div class="empty-state"><div class="ei">📋</div><p>No hay tareas aún.</p></div>';return;}
  g.innerHTML=tasks.map(t=>`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="task-card-icon" style="margin-bottom:0">${t.icon||'📋'}</div>
      <span class="drop-status ${t.active!==false?'drop-status-on':'drop-status-off'}">${t.active!==false?'✅ Activo':'⏸ Inactivo'}</span>
    </div>
    <div class="card-name">${esc(t.name)}</div>
    <div class="subtask-list">
      ${(t.subtasks||[]).map(s=>{
        const d=drops.find(dr=>dr.id===s.dropId);
        return `<div class="subtask-item">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="subtask-color" style="background:${s.color}"></div>
            <span>${esc(s.name)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            ${d?`<span class="drop-badge">💧 ${esc(d.name)}</span>`:''}
            <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text2)">${s.date}</span>
          </div>
        </div>`;
      }).join('')}
      ${!(t.subtasks||[]).length?'<span style="font-size:11px;color:var(--text2)">Sin sub-tareas</span>':''}
    </div>
    <div class="card-actions" style="margin-top:14px">
      <button class="btn-sm" onclick="editTask('${t.id}')">✏️ Editar</button>
      <button class="btn-sm danger" onclick="deleteTask('${t.id}')">🗑</button>
    </div>
  </div>`).join('');
}

let subtaskCount=0;
function addSubtaskField(data={}){
  subtaskCount++;
  const id='st'+subtaskCount;
  const colorDots=COLORS.map(c=>`<div class="color-dot ${data.color===c?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor(this,'${id}')"></div>`).join('');
  const dropOpts=drops.map(d=>`<option value="${d.id}" ${data.dropId===d.id?'selected':''}>${d.name} (${d.date})</option>`).join('');
  const div=document.createElement('div');
  div.id=id;
  div.style.cssText='background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px';
  div.innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input type="text" placeholder="Nombre sub-tarea" value="${esc(data.name||'')}"
        style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-family:'Syne',sans-serif;font-size:13px;outline:none" class="st-name">
      <input type="date" value="${data.date||''}"
        style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-family:'DM Mono',sans-serif;font-size:12px;outline:none" class="st-date">
      <button onclick="document.getElementById('${id}').remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px">✕</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;flex-shrink:0">Drop:</span>
      <select class="st-drop" style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-family:'Syne',sans-serif;font-size:12px;outline:none">
        <option value="">— Sin drop —</option>${dropOpts}
      </select>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div style="display:flex;align-items:center;gap:8px;flex:1">
        <span style="font-size:11px;color:var(--text2);font-family:'DM Mono',monospace">Color:</span>
        <div class="color-picker" id="cp-${id}">${colorDots}</div>
        <input type="hidden" class="st-color" value="${data.color||COLORS[0]}">
      </div>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;font-size:11px;font-family:'DM Mono',monospace;color:var(--text2)">
        <input type="checkbox" class="st-active" ${data.active===false?'':'checked'}
          style="accent-color:var(--accent);width:14px;height:14px">
        Activo
      </label>
    </div>`;
  document.getElementById('subtask-fields').appendChild(div);
  if(!data.color) selectColor(div.querySelector('.color-dot'),id);
}

function selectColor(dot,stId){
  document.getElementById('cp-'+stId)?.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));
  dot.classList.add('selected');
  dot.closest('[id^="st"]').querySelector('.st-color').value=dot.dataset.color;
}

async function saveTask(){
  const name=document.getElementById('task-name').value.trim();
  if(!name){toast('⚠️ Ingresa un nombre');return;}
  const icon=document.getElementById('task-icon').value.trim()||'📋';
  const active=document.getElementById('task-active').value!=='false';
  const subtasks=[];
  document.getElementById('subtask-fields').querySelectorAll('[id^="st"]').forEach(div=>{
    const n=div.querySelector('.st-name')?.value.trim();
    const d=div.querySelector('.st-date')?.value;
    const c=div.querySelector('.st-color')?.value||COLORS[0];
    const dr=div.querySelector('.st-drop')?.value||null;
    const sa=div.querySelector('.st-active')?.checked!==false;
    if(n&&d) subtasks.push({id:uid(),name:n,date:d,color:c,dropId:dr||null,active:sa});
  });
  const row={name, icon, active, subtasks};
  if(editingTaskId){
    const saved=await sbUpdate('tasks', editingTaskId, row);
    if(saved){ const t=tasks.find(x=>x.id===editingTaskId); Object.assign(t, normTask({...row, id:editingTaskId})); }
  } else {
    const saved=await sbInsert('tasks', row);
    if(saved) tasks.push(normTask(saved));
  }
  renderAll(); closeModal('task'); toast('✅ Tarea guardada');
}

function editTask(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  editingTaskId=id;
  document.getElementById('modal-task-title').textContent='Editar Tarea';
  document.getElementById('task-name').value=t.name;
  document.getElementById('task-icon').value=t.icon||'';
  document.getElementById('task-active').value=String(t.active!==false);
  document.getElementById('subtask-fields').innerHTML='';
  subtaskCount=0;
  (t.subtasks||[]).forEach(s=>addSubtaskField(s));
  document.getElementById('modal-task').classList.add('open');
}

async function deleteTask(id){
  await sbDelete('tasks', id);
  tasks=tasks.filter(t=>t.id!==id);
  users.forEach(u=>{ u.taskIds=(u.taskIds||[]).filter(tid=>tid!==id); });
  renderAll(); toast('🗑 Tarea eliminada');
}

// ============================================================
// DROPS
// ============================================================
function renderDrops(){
  const g=document.getElementById('drops-grid');
  if(!g) return;
  if(!drops.length){g.innerHTML='<div class="empty-state"><div class="ei">💧</div><p>No hay drops aún.</p></div>';return;}
  g.innerHTML=[...drops].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(d=>`
    <div class="card ${d.active?'drop-card-active':''}">
      <div style="font-size:28px;margin-bottom:8px">💧</div>
      <div class="card-name">${esc(d.name)}</div>
      <div style="margin-top:8px;margin-bottom:10px">
        <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--accent2)">📅 ${d.date}</span>
      </div>
      <span class="drop-status ${d.active?'drop-status-on':'drop-status-off'}">${d.active?'✅ Activo':'⏸ Inactivo'}</span>
      <div class="card-actions" style="margin-top:14px">
        <button class="btn-sm" onclick="editDrop('${d.id}')">✏️ Editar</button>
        <button class="btn-sm danger" onclick="deleteDrop('${d.id}')">🗑</button>
      </div>
    </div>`).join('');
}

function editDrop(id){
  const d=drops.find(x=>x.id===id); if(!d) return;
  editingDropId=id;
  document.getElementById('modal-drop-title').textContent='Editar Drop';
  document.getElementById('drop-name').value=d.name;
  document.getElementById('drop-date').value=d.date;
  document.getElementById('drop-active').value=String(d.active);
  document.getElementById('modal-drop').classList.add('open');
}

async function saveDrop(){
  const name=document.getElementById('drop-name').value.trim();
  if(!name){toast('⚠️ Ingresa un nombre');return;}
  const date=document.getElementById('drop-date').value;
  if(!date){toast('⚠️ Selecciona una fecha');return;}
  const active=document.getElementById('drop-active').value==='true';
  const row={name, date, active};
  if(editingDropId){
    const saved=await sbUpdate('drops', editingDropId, row);
    if(saved){ const d=drops.find(x=>x.id===editingDropId); Object.assign(d, normDrop({...row, id:editingDropId})); }
  } else {
    const saved=await sbInsert('drops', row);
    if(saved) drops.push(normDrop(saved));
  }
  renderAll(); closeModal('drop'); toast('✅ Drop guardado');
}

async function deleteDrop(id){
  await sbDelete('drops', id);
  drops=drops.filter(d=>d.id!==id); renderAll(); toast('🗑 Drop eliminado');
}

// ============================================================
// RACE
// ============================================================
function getUserSubsByTask(u){
  const userTasks=tasks.filter(t=>(u.taskIds||[]).includes(t.id));
  const groups=[];
  userTasks.forEach(t=>{
    const subs=(t.subtasks||[])
      .filter(s=>{ const ids=u.subtaskIds||[]; return !ids.length||ids.includes(s.id); })
      .sort((a,b)=>new Date(a.date)-new Date(b.date));
    if(subs.length) groups.push({task:t,subs});
  });
  return groups;
}

function renderRace(){
  const track=document.getElementById('race-track');
  const classPanel=document.getElementById('race-classification');

  // Only active drops, sorted by date
  const activeDrops=[...drops.filter(d=>d.active)].sort((a,b)=>new Date(a.date)-new Date(b.date));

  if(!activeDrops.length){
    track.innerHTML='<div class="empty-state"><div class="ei">💧</div><p>No hay drops activos. Activa al menos uno en la sección Drops.</p></div>';
    if(classPanel) classPanel.innerHTML='';
    return;
  }

  const usersWithTasks=users.filter(u=>(u.taskIds||[]).length>0);
  if(!usersWithTasks.length){
    track.innerHTML='<div class="empty-state"><div class="ei">🏁</div><p>Asigna tareas a usuarios para ver la carrera.</p></div>';
    if(classPanel) classPanel.innerHTML='';
    return;
  }

  // Global range = oldest active drop → newest active drop
  const globalFirst=new Date(activeDrops[0].date); globalFirst.setHours(0,0,0,0);
  const globalLast=new Date(activeDrops[activeDrops.length-1].date); globalLast.setHours(0,0,0,0);
  const globalMs=(globalLast-globalFirst)||1;

  const now=new Date(); now.setHours(0,0,0,0);

  // Position helper: pct within global range
  function pctOf(dateStr){
    const d=new Date(dateStr); d.setHours(0,0,0,0);
    return Math.min(100,Math.max(0,((d-globalFirst)/globalMs)*100));
  }

  // Build race data
  const raceData=usersWithTasks.map(u=>{
    const byTask=getUserSubsByTask(u);
    const allSubs=byTask.flatMap(g=>g.subs);
    if(!allSubs.length) return null;
    // Progress: how many subtasks have date <= today
    const done=allSubs.filter(s=>new Date(s.date)<=now).length;
    const pct=Math.round((done/allSubs.length)*100);
    return {u,byTask,allSubs,pct};
  }).filter(Boolean);

  // ── DROP RULER ──
  const dropPinsHtml=activeDrops.map(d=>{
    const p=pctOf(d.date);
    return `<div class="drop-pin" style="left:${p}%">
      <span class="drop-pin-label">${esc(d.name)}<br>${d.date}</span>
      <span class="drop-pin-flag">🏁</span>
      <div class="drop-pin-stem"></div>
    </div>`;
  }).join('');

  const rulerHtml=`<div class="drop-ruler-row">
    <div class="drop-ruler-spacer"></div>
    <div class="drop-ruler-lane">
      <div class="drop-ruler-line"></div>
      ${dropPinsHtml}
    </div>
  </div>`;

  // ── ROWS ──
  const rowsHtml=raceData.map(({u,byTask,allSubs,pct})=>{
    const lineColor=u.role==='dev'?'var(--dev)':'var(--qa)';
    const av=u.imgData?`<img src="${u.imgData}">`:`<span>${u.img||'🧑'}</span>`;

    // Grouped dots — only active tasks
    const groupedDots=byTask.filter(g=>g.task.active!==false).map(g=>{
      const circles=g.subs.filter(s=>s.active!==false).map(s=>{
        const done=new Date(s.date)<=now;
        return `<div class="runner-dot ${done?'done':'pending'}" style="background:${s.color}" title="${esc(s.name)} (${s.date})"></div>`;
      }).join('');
      return `<div class="runner-task-group">
        <span class="runner-task-icon has-tooltip" data-tip="${esc(g.task.name)}">${g.task.icon||'📋'}</span>
        ${circles}
      </div>`;
    }).join('');

    // Runner position based on today clamped to global range
    const todayClamped=now<globalFirst?globalFirst:(now>globalLast?globalLast:now);
    const runnerPct=Math.min(100,Math.max(0,((todayClamped-globalFirst)/globalMs)*100));

    // Split subtasks: overlapping with runner (±3%) go on avatar, rest stay on lane
    const OVERLAP_THRESHOLD=3;
    const onAvatar=[], onLane=[];
    allSubs.forEach(s=>{
      const p=pctOf(s.date);
      Math.abs(p-runnerPct)<=OVERLAP_THRESHOLD ? onAvatar.push({...s,p}) : onLane.push({...s,p});
    });

    // Lane markers — normal, but with white border
    const markers=onLane.map(s=>{
      const done=new Date(s.date)<=now;
      return `<div class="lane-sub-marker" style="left:${s.p}%;background:${s.color}" title="${esc(s.name)}: ${s.date}"></div>`;
    }).join('');

    // Avatar overlay dots — only the ones that coincide with runner position
    const avatarDots=onAvatar.map((s,i)=>{
      const done=new Date(s.date)<=now;
      // distribute vertically in a small column centered on avatar
      const total=onAvatar.length;
      const angle=(2*Math.PI/Math.max(total,1))*i - Math.PI/2;
      const r=44;
      const x=50+r*Math.cos(angle);
      const y=50+r*Math.sin(angle);
      return `<div class="avatar-overlay-dot"
        style="left:${x}%;top:${y}%;background:${s.color};filter:${done?'none':'brightness(.4)'}"
        title="${esc(s.name)}: ${s.date}"></div>`;
    }).join('');

    return `<div class="race-row">
      <div class="race-user-label">
        <div class="race-user-avatar">${av}</div>
        <div>
          <div class="race-user-name">${esc(u.name)}</div>
          <div class="race-user-role" style="color:${lineColor}">${u.role==='dev'?'Dev':'QA'}</div>
        </div>
      </div>
      <div class="race-lane">
        <div class="lane-line"></div>
        <div class="lane-line-fill" style="background:${lineColor};width:${runnerPct}%"></div>
        ${markers}
        <div class="lane-start-flag">🏳️</div>
        <div class="lane-runner" style="left:calc(${runnerPct}% * (100% - 44px) / 100% + 22px)">
          <div class="runner-wrap">
            <div class="runner-dots">${groupedDots}</div>
            <div class="runner-avatar" style="border-color:${lineColor};box-shadow:0 0 16px ${lineColor}55;position:relative">
              ${av}
              ${avatarDots?`<div class="avatar-overlay">${avatarDots}</div>`:''}
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  track.innerHTML=rulerHtml+rowsHtml;

  // ── CLASSIFICATION ──
  if(!classPanel) return;
  const ranked=[...raceData].sort((a,b)=>b.pct-a.pct);
  const medals=['🥇','🥈','🥉'];

  classPanel.innerHTML=`<div class="class-title">🏆 Clasificación</div><div class="class-table">`+
    ranked.map(({u,byTask,pct},i)=>{
      const lineColor=u.role==='dev'?'var(--dev)':'var(--qa)';
      const av=u.imgData?`<img src="${u.imgData}">`:`<span>${u.img||'🧑'}</span>`;
      const rank=i<3?medals[i]:`${i+1}`;
      const taskGroupsHtml=byTask.map(g=>{
        const subsHtml=g.subs.map(s=>{
          const done=new Date(s.date)<=now;
          const drop=drops.find(d=>d.id===s.dropId);
          return `<div class="class-sub-entry">
            <div class="class-sub-dot ${done?'done':'pending'}" style="background:${s.color}"></div>
            <div class="class-sub-info">
              <span class="class-sub-name">${esc(s.name)}</span>
              <span class="class-sub-date">${s.date}${drop?' · 💧'+esc(drop.name):''}</span>
            </div>
          </div>`;
        }).join('');
        return `<div class="class-task-group">
          <span class="class-task-icon">${g.task.icon||'📋'}</span>
          <div class="class-task-body">
            <span class="class-task-name">${esc(g.task.name)}</span>
            ${subsHtml}
          </div>
        </div>`;
      }).join('');
      return `<div class="class-row">
        <div class="class-rank">${rank}</div>
        <div class="class-user-avatar">${av}</div>
        <div class="class-user-info">
          <div class="class-user-name">${esc(u.name)}</div>
          <div class="class-user-role" style="color:${lineColor}">${u.role==='dev'?'🧑‍💻 Dev':'🔍 QA'}</div>
        </div>
        <div class="class-tasks">${taskGroupsHtml}</div>
        <div class="class-progress-wrap">
          <div class="class-progress-pct" style="color:${lineColor}">${pct}%</div>
          <div class="class-progress-bar-bg"><div class="class-progress-bar" style="width:${pct}%;background:${lineColor}"></div></div>
        </div>
      </div>`;
    }).join('')+`</div>`;
}

init();
</script>
</body>
</html>
